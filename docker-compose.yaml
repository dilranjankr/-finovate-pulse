# Finovate Pulse — Operations Command Center
# Deploy on Coolify as a "Docker Compose" resource.
# Set the variables (DATABASE_URL, GEMINI_API_KEY, NEXT_PUBLIC_API_URL, ...)
# in the Coolify "Environment Variables" tab — do NOT commit real secrets.

services:
  backend:
    build:
      context: ./backend
    environment:
      - DATABASE_URL=${DATABASE_URL}
      # Optional write connection (postgres role) — only needed to EDIT the
      # employee_mapping table from the app. Reads work via DATABASE_URL.
      - DATABASE_URL_WRITE=${DATABASE_URL_WRITE:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-3.1-flash-lite}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-*}
      # ---- Auth (login). Sessions sign with JWT_SECRET — set a long random
      # value in Coolify so logins survive restarts. Owner is bootstrapped from
      # OWNER_EMAIL/OWNER_PASSWORD on first boot (change the password after login).
      - JWT_SECRET=${JWT_SECRET:-}
      - OWNER_EMAIL=${OWNER_EMAIL:-admin@finovate.com}
      - OWNER_PASSWORD=${OWNER_PASSWORD:-owner@123}
      # PUBLIC_APP_URL = the public dashboard URL (used to build invite links).
      - PUBLIC_APP_URL=${PUBLIC_APP_URL:-}
      # Optional SMTP — set these to email invites; otherwise owner copies the link.
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-}
    # 'expose' (not 'ports') — Coolify's proxy routes the backend domain to this
    # internal port, so it never clashes with Coolify's own host ports.
    expose:
      - "8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        # NEXT_PUBLIC_* is baked at build time — must be the PUBLIC backend URL
        # the browser will call (e.g. https://api.yourdomain.com).
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    expose:
      - "3000"
    depends_on:
      - backend
    restart: unless-stopped
